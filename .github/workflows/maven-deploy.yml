name: Maven deploy
on:
  workflow_call:
    inputs:
      java-version:
        type: string
        description: The Java version to use for the build.
        required: true
permissions:
  contents: read
env:
  JAVA_TOOL_OPTIONS: >-
    -XX:TieredStopAtLevel=1
    -XX:+UseParallelGC
jobs:
  deploy:
    name: Maven deploy
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
          gpg-private-key: ${{ secrets.GPG_KEY }}
          server-id: central
          server-username: CENTRAL_PORTAL_USERNAME
          server-password: CENTRAL_PORTAL_PASSWORD
      - name: Cache local Maven repository
        uses: gantsign/maven-periodic-cache-action@v1
        with:
          key-suffix: '-deploy'
      - name: Deploy with Maven
        run: |
          [ "$GITHUB_REF_TYPE" = 'tag' ] && GIT_TAG="$GITHUB_REF_NAME"
          ./mvnw deploy \
              -P publish-artifacts,sign-artifacts,central-deploy \
              -Dmaven.install.skip=true \
              -DskipTests \
              -Dinvoker.skip=true \
              "-Drevision=${GIT_TAG:-development-SNAPSHOT}" \
              --batch-mode \
              --show-version \
              -Dstyle.color=always
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          GPG_KEY_NAME: ${{ secrets.GPG_KEY_NAME }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
